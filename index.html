<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Invader Gen</title>
    <link rel="stylesheet" href="styles.css">
  </head>
  <body>
    <main class="app">
      <section class="workspace" aria-label="Pixel editor">
        <header class="topbar">
          <div>
            <h1>Invader Gen</h1>
            <p>13 x 13 one-bit pixel editor</p>
          </div>
          <div class="actions" aria-label="Editor actions">
            <button id="clearButton" class="icon-button" type="button" aria-label="Clear canvas" title="Clear canvas">
              <svg viewBox="0 0 24 24" aria-hidden="true" focusable="false">
                <path d="M3 6h18"/>
                <path d="M8 6V4h8v2"/>
                <path d="M6 6l1 15h10l1-15"/>
                <path d="M10 11v6"/>
                <path d="M14 11v6"/>
              </svg>
            </button>
          </div>
        </header>

        <div class="editor">
          <div class="toolbox" aria-label="Drawing tools">
            <fieldset>
              <legend>Tool</legend>
              <div class="tool-choice-group">
                <label class="toggle-button tool-choice">
                  <input type="radio" name="tool" value="draw" checked>
                  <svg viewBox="0 0 24 24" aria-hidden="true" focusable="false">
                    <path d="M4 20h4l11-11a2.8 2.8 0 0 0-4-4L4 16z"/>
                    <path d="M13 7l4 4"/>
                  </svg>
                  <span>Draw</span>
                </label>
                <label class="toggle-button tool-choice">
                  <input type="radio" name="tool" value="erase">
                  <svg viewBox="0 0 24 24" aria-hidden="true" focusable="false">
                    <path d="M7 21h10"/>
                    <path d="M4 15l9-9a3 3 0 0 1 4 4l-9 9z"/>
                    <path d="M10 9l5 5"/>
                  </svg>
                  <span>Erase</span>
                </label>
                <label class="toggle-button tool-choice">
                  <input type="radio" name="tool" value="toggle">
                  <svg viewBox="0 0 24 24" aria-hidden="true" focusable="false">
                    <path d="M8 7h8"/>
                    <path d="M8 17h8"/>
                    <path d="M17 4l3 3-3 3"/>
                    <path d="M7 14l-3 3 3 3"/>
                  </svg>
                  <span>Toggle</span>
                </label>
              </div>
            </fieldset>

            <div class="tool-actions" aria-label="Canvas actions">
              <label class="toggle-button">
                <input id="mirrorInput" type="checkbox">
                <svg viewBox="0 0 24 24" aria-hidden="true" focusable="false">
                  <path d="M12 4v16"/>
                  <path d="M8 7H4v10h4z"/>
                  <path d="M16 7h4v10h-4z"/>
                </svg>
                <span>Mirror</span>
              </label>
              <button id="invertButton" class="icon-button labeled-icon-button" type="button" aria-label="Invert pixels" title="Invert pixels">
                <svg viewBox="0 0 24 24" aria-hidden="true" focusable="false">
                  <path d="M12 3a9 9 0 0 0 0 18z"/>
                  <path d="M12 3a9 9 0 0 1 0 18"/>
                </svg>
                <span>Invert</span>
              </button>
            </div>

            <fieldset>
              <legend>Canvas</legend>
              <label for="sizeInput">Size</label>
              <input id="sizeInput" type="number" min="2" max="64" value="13">
              <button id="resizeButton" class="icon-button" type="button" aria-label="Resize canvas" title="Resize canvas">
                <svg viewBox="0 0 24 24" aria-hidden="true" focusable="false">
                  <path d="M4 9V4h5"/>
                  <path d="M20 15v5h-5"/>
                  <path d="M4 4l6 6"/>
                  <path d="M20 20l-6-6"/>
                </svg>
              </button>
            </fieldset>
          </div>

          <div class="board-wrap">
            <div class="board-frame" aria-label="Canvas expansion controls">
              <div class="edge-controls edge-top">
                <button class="edge-button" type="button" data-edge-action="add" data-edge="top" aria-label="Add row to top">+</button>
                <button class="edge-button" type="button" data-edge-action="remove" data-edge="top" aria-label="Remove row from top">-</button>
              </div>
              <div class="edge-controls edge-right">
                <button class="edge-button" type="button" data-edge-action="add" data-edge="right" aria-label="Add column to right">+</button>
                <button class="edge-button" type="button" data-edge-action="remove" data-edge="right" aria-label="Remove column from right">-</button>
              </div>
              <div id="board" class="board" role="grid" aria-label="Drawing canvas"></div>
              <div class="edge-controls edge-left">
                <button class="edge-button" type="button" data-edge-action="add" data-edge="left" aria-label="Add column to left">+</button>
                <button class="edge-button" type="button" data-edge-action="remove" data-edge="left" aria-label="Remove column from left">-</button>
              </div>
              <div class="edge-controls edge-bottom">
                <button class="edge-button" type="button" data-edge-action="add" data-edge="bottom" aria-label="Add row to bottom">+</button>
                <button class="edge-button" type="button" data-edge-action="remove" data-edge="bottom" aria-label="Remove row from bottom">-</button>
              </div>
            </div>
          </div>
        </div>
      </section>

      <aside class="export-panel" aria-label="Text export">
        <section class="gallery-section" aria-label="Saved creations">
          <div class="panel-heading">
            <h2>Gallery</h2>
            <span id="galleryCount"></span>
          </div>
          <div class="save-row">
            <input id="nameInput" type="text" maxlength="60" value="Untitled" aria-label="Creation name">
            <button id="saveButton" class="icon-button" type="button" aria-label="Save creation" title="Save creation">
              <svg viewBox="0 0 24 24" aria-hidden="true" focusable="false">
                <path d="M5 3h12l2 2v16H5z"/>
                <path d="M8 3v6h8V3"/>
                <path d="M8 21v-7h8v7"/>
              </svg>
            </button>
          </div>
          <div class="upload-row" aria-label="Redis upload actions">
            <div class="selected-actions">
              <button id="uploadButton" class="icon-button" type="button" disabled aria-label="Upload selected" title="Upload selected">
                <svg viewBox="0 0 24 24" aria-hidden="true" focusable="false">
                  <path d="M12 3v12"/>
                  <path d="M7 8l5-5 5 5"/>
                  <path d="M5 15v5h14v-5"/>
                </svg>
              </button>
              <button id="deleteSelectedButton" class="icon-button" type="button" disabled aria-label="Delete selected" title="Delete selected">
                <svg viewBox="0 0 24 24" aria-hidden="true" focusable="false">
                  <path d="M3 6h18"/>
                  <path d="M8 6V4h8v2"/>
                  <path d="M6 6l1 15h10l1-15"/>
                  <path d="M10 11v6"/>
                  <path d="M14 11v6"/>
                </svg>
              </button>
            </div>
            <span id="selectedCount">0 selected</span>
          </div>
          <div id="gallery" class="gallery"></div>
        </section>

        <section class="text-section" aria-label="Text import and export">
          <div class="panel-heading">
            <h2>Text Export</h2>
            <span id="status" role="status" aria-live="polite"></span>
          </div>
          <textarea id="exportText" spellcheck="false" aria-label="Exported pixel data"></textarea>
          <div class="import-row">
            <div class="export-group" aria-label="Source format actions">
              <span>Source</span>
              <div class="icon-row">
                <button id="copyButton" class="icon-button" type="button" aria-label="Copy text" title="Copy text">
                  <svg viewBox="0 0 24 24" aria-hidden="true" focusable="false">
                    <path d="M9 9h10v12H9z"/>
                    <path d="M5 15H4V3h12v1"/>
                  </svg>
                </button>
                <button id="importButton" class="icon-button" type="button" aria-label="Import text" title="Import text">
                  <svg viewBox="0 0 24 24" aria-hidden="true" focusable="false">
                    <path d="M12 21V9"/>
                    <path d="M7 14l5-5 5 5"/>
                    <path d="M5 3h14"/>
                  </svg>
                </button>
                <button id="downloadButton" class="icon-button" type="button" aria-label="Download .invader" title="Download .invader">
                  <svg viewBox="0 0 24 24" aria-hidden="true" focusable="false">
                    <path d="M12 3v12"/>
                    <path d="M7 10l5 5 5-5"/>
                    <path d="M5 21h14"/>
                  </svg>
                </button>
              </div>
            </div>
            <div class="export-group" aria-label="Image export actions">
              <span>Image</span>
              <div class="icon-row">
                <button id="pngButton" class="icon-button labeled-icon-button" type="button" aria-label="Download PNG" title="Download PNG">
                  <svg viewBox="0 0 24 24" aria-hidden="true" focusable="false">
                    <path d="M5 3h14v18H5z"/>
                    <path d="M8 8h8"/>
                    <path d="M8 12h8"/>
                    <path d="M8 16h5"/>
                  </svg>
                  <span>PNG</span>
                </button>
                <button id="svgButton" class="icon-button labeled-icon-button" type="button" aria-label="Download SVG" title="Download SVG">
                  <svg viewBox="0 0 24 24" aria-hidden="true" focusable="false">
                    <path d="M5 3h14v18H5z"/>
                    <path d="M9 9l-3 3 3 3"/>
                    <path d="M15 9l3 3-3 3"/>
                    <path d="M13 8l-2 8"/>
                  </svg>
                  <span>SVG</span>
                </button>
              </div>
            </div>
          </div>
        </section>
      </aside>
    </main>

    <script src="app.js"></script>
  </body>
</html>
